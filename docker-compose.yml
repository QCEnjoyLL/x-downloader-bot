services:
  telegram-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - ./telegram-api:/var/lib/telegram-bot-api
    restart: unless-stopped

  x-downloader-bot:
    image: orangeqiu/x-downloader-bot:latest
    ports:
      - "3000:3000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - PORT=3000
      - POLLING=${POLLING:-true}
      - TELEGRAM_API_URL=${TELEGRAM_API_URL:-http://telegram-api:8081}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - telegram-api
